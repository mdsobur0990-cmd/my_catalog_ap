name: Build APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          flutter-version: '3.19.0'

      - name: Auto-Generate Project & Rename
        run: |
          flutter create --platforms android .
          
          # Change App Name to "View Me"
          sed -i 's/android:label="product_catalog"/android:label="View Me"/' android/app/src/main/AndroidManifest.xml
          
          # Add Camera Permissions
          sed -i '/<application/i \    <uses-permission android:name="android.permission.CAMERA" />' android/app/src/main/AndroidManifest.xml
          
          # Replace logo if you uploaded app_icon.png
          if [ -f "app_icon.png" ]; then
            cp app_icon.png android/app/src/main/res/mipmap-mdpi/ic_launcher.png
            cp app_icon.png android/app/src/main/res/mipmap-hdpi/ic_launcher.png
            cp app_icon.png android/app/src/main/res/mipmap-xhdpi/ic_launcher.png
            cp app_icon.png android/app/src/main/res/mipmap-xxhdpi/ic_launcher.png
            cp app_icon.png android/app/src/main/res/mipmap-xxxhdpi/ic_launcher.png
          fi

      - name: Build APK
        run: |
          flutter pub get
          flutter build apk --debug

      - name: Upload Finished APK
        uses: actions/upload-artifact@v4
        with:
          name: View-Me-App
          path: build/app/outputs/flutter-apk/app-debug.apk
