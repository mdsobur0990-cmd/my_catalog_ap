name: Build APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          flutter-version: '3.19.0'

      - name: Auto-Generate Project Folders
        run: |
          # This generates the Android folders automatically
          flutter create --platforms android .
          
          # This adds the Camera permission
          sed -i '/<application/i \    <uses-permission android:name="android.permission.CAMERA" />' android/app/src/main/AndroidManifest.xml
          
          # This sets the App Name
          sed -i 's/android:label="product_catalog"/android:label="My Catalog"/' android/app/src/main/AndroidManifest.xml

      - name: Build Debug APK
        run: |
          flutter pub get
          flutter build apk --debug

      - name: Upload Finished APK
        uses: actions/upload-artifact@v4
        with:
          name: My-Product-Catalog-App
          path: build/app/outputs/flutter-apk/app-debug.apk
